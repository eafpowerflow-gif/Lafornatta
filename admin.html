<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — LÀ FORNATTA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&display=swap');
:root{
  --red:#C8102E;--red-dark:#8E0B20;--black:#141414;--charcoal:#1f1f1f;
  --cream:#F5F0E8;--orange:#E8862E;--line:rgba(245,240,232,0.08);
  --green:#2ECC71;--green-dark:#27AE60;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--cream);font-family:'Oswald',sans-serif;font-weight:300;min-height:100vh;}
h1,h2,h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:0.02em;}

#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{width:100%;max-width:380px;background:var(--charcoal);border:1px solid var(--line);border-top:3px solid var(--red);border-radius:4px;padding:36px 32px;}
.login-box h1{font-size:1.6rem;margin-bottom:4px;}
.login-box p{font-size:0.8rem;color:rgba(245,240,232,0.4);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(245,240,232,0.5);margin-bottom:6px;}
.field input{width:100%;padding:10px 14px;background:#141414;border:1px solid rgba(245,240,232,0.12);border-radius:2px;color:var(--cream);font-family:'Oswald';font-size:0.95rem;outline:none;}
.field input:focus{border-color:var(--red);}
.btn-full{width:100%;padding:12px;background:var(--red);color:var(--cream);border:none;border-radius:2px;font-family:'Oswald';font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px;}
.btn-full:hover{background:var(--red-dark);}
.login-err{color:#ff6b6b;font-size:0.8rem;margin-top:12px;text-align:center;display:none;}

#screen-admin{display:none;}
header.admin-header{position:sticky;top:0;z-index:40;background:rgba(20,20,20,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.admin-nav{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:12px;flex-wrap:wrap;}
.brand-small{display:flex;align-items:center;gap:10px;}
.brand-small span{font-family:'Anton';font-size:1.1rem;letter-spacing:0.08em;}
.brand-small small{font-size:0.55rem;letter-spacing:0.35em;color:var(--orange);font-weight:600;display:block;}
.nav-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-sm{padding:8px 18px;border-radius:2px;font-family:'Oswald';font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-commit{background:var(--green);color:#fff;}
.btn-commit:hover{background:var(--green-dark);}
.btn-secondary{background:transparent;border:1px solid rgba(245,240,232,0.2);color:var(--cream);}
.btn-secondary:hover{border-color:var(--orange);color:var(--orange);}

.admin-main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}

.status-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--charcoal);border:1px solid var(--line);border-radius:2px;margin-bottom:28px;font-size:0.8rem;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);}
.dot-warn{background:var(--orange);}
.dot-err{background:var(--red);}
.status-text{color:rgba(245,240,232,0.7);}
.status-sub{color:rgba(245,240,232,0.3);font-size:0.72rem;margin-left:auto;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:32px;overflow-x:auto;}
.tab-btn{padding:12px 22px;font-family:'Oswald';font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;cursor:pointer;background:transparent;border:none;color:rgba(245,240,232,0.4);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{color:rgba(245,240,232,0.7);}
.tab-btn.active{color:var(--cream);border-bottom-color:var(--red);}
.tab-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:2px;}

.table-header{display:grid;grid-template-columns:1fr repeat(4,80px) 90px;gap:4px;padding:8px 14px;background:#1a1a1a;border:1px solid var(--line);border-bottom:none;border-radius:2px 2px 0 0;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(245,240,232,0.3);font-weight:600;}
.table-header span{text-align:center;}
.table-header span:first-child{text-align:left;}
.price-table{border:1px solid var(--line);border-radius:0 0 2px 2px;overflow:hidden;}
.menu-row{display:grid;grid-template-columns:1fr repeat(4,80px) 90px;gap:4px;padding:11px 14px;background:var(--charcoal);border-bottom:1px solid var(--line);align-items:center;transition:background .15s;}
.menu-row:last-child{border-bottom:none;}
.menu-row:hover{background:#252525;}
.row-name{font-family:'Oswald';font-weight:600;font-size:0.95rem;color:var(--orange);letter-spacing:0.04em;}
.row-desc{font-size:0.65rem;color:rgba(245,240,232,0.28);margin-top:1px;line-height:1.3;}
.price-cell input{width:100%;padding:5px 6px;text-align:center;background:#141414;border:1px solid rgba(245,240,232,0.1);border-radius:2px;color:var(--cream);font-family:'Oswald';font-size:0.82rem;outline:none;}
.price-cell input:focus{border-color:var(--orange);}
.price-cell input.zero{color:rgba(245,240,232,0.25);}
.row-actions{display:flex;gap:6px;justify-content:center;}
.btn-icon{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line);background:transparent;color:rgba(245,240,232,0.5);font-size:0.85rem;transition:all .15s;}
.btn-icon:hover.edit{border-color:var(--orange);color:var(--orange);}
.btn-icon:hover.del{border-color:var(--red);color:var(--red);}

.add-row-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;margin-top:8px;background:transparent;border:1px dashed rgba(245,240,232,0.12);border-radius:2px;color:rgba(245,240,232,0.4);font-family:'Oswald';font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.add-row-btn:hover{border-color:var(--orange);color:var(--orange);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{width:100%;max-width:460px;background:var(--charcoal);border:1px solid var(--line);border-top:3px solid var(--orange);border-radius:4px;padding:28px;}
.modal-box h3{font-size:1.2rem;margin-bottom:20px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(245,240,232,0.45);margin-bottom:5px;}
.modal-field input,.modal-field textarea{width:100%;padding:9px 12px;background:#141414;border:1px solid rgba(245,240,232,0.12);border-radius:2px;color:var(--cream);font-family:'Oswald';font-size:0.9rem;outline:none;}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--orange);}
.modal-field textarea{resize:vertical;min-height:72px;line-height:1.4;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-modal-cancel{padding:9px 20px;background:transparent;border:1px solid rgba(245,240,232,0.15);border-radius:2px;color:rgba(245,240,232,0.6);font-family:'Oswald';font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
.btn-modal-save{padding:9px 24px;background:var(--orange);border:none;border-radius:2px;color:var(--cream);font-family:'Oswald';font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;cursor:pointer;}
.btn-modal-save:hover{background:#d4741a;}

.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;}
.saving-box{background:var(--charcoal);border:1px solid var(--line);border-top:3px solid var(--green);border-radius:4px;padding:32px 40px;text-align:center;}
.saving-box p{margin-top:12px;font-size:0.85rem;color:rgba(245,240,232,0.6);}
.spinner{width:36px;height:36px;border:3px solid rgba(245,240,232,0.1);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--charcoal);border:1px solid var(--line);border-radius:2px;padding:10px 20px;font-size:0.82rem;letter-spacing:0.05em;color:var(--cream);opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:#ff6b6b;}

@media(max-width:700px){
  .table-header,.menu-row{grid-template-columns:1fr repeat(2,72px) 80px;}
  .table-header span:nth-child(4),.table-header span:nth-child(5),
  .menu-row .price-cell:nth-child(4),.menu-row .price-cell:nth-child(5){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <h1>LÀ FORNATTA</h1>
    <p>Painel administrativo</p>
    <div class="field">
      <label>Senha de acesso</label>
      <input type="password" id="inp-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')tentarLogin()">
    </div>
    <button class="btn-full" onclick="tentarLogin()">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin">
  <header class="admin-header">
    <div class="admin-nav">
      <div class="brand-small">
        <img src="logo.png" width="32" height="32" style="border-radius:50%;" alt="">
        <div><span>LÀ FORNATTA</span><small>Admin</small></div>
      </div>
      <div class="nav-actions">
        <button class="btn-sm btn-secondary" onclick="sair()">Sair</button>
      </div>
    </div>
  </header>

  <div class="admin-main">
    <div class="status-bar" id="status-bar">
      <span class="status-dot dot-warn" id="status-dot"></span>
      <span class="status-text" id="status-text">Conectando ao banco de dados...</span>
      <span class="status-sub" id="status-sub"></span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="table-area"></div>
  </div>
</div>

<!-- Modal sabor -->
<div class="modal-overlay" id="modal-sabor" style="display:none;" onclick="if(event.target===this)fecharModal()">
  <div class="modal-box">
    <h3 id="modal-titulo">Novo Sabor</h3>
    <div class="modal-field">
      <label>Nome do sabor</label>
      <input type="text" id="m-nome" placeholder="Ex: Pepperoni">
    </div>
    <div class="modal-field">
      <label>Ingredientes</label>
      <textarea id="m-desc" placeholder="Molho especial, mussarela..."></textarea>
    </div>
    <div class="price-grid">
      <div class="modal-field"><label>40cm Grande (R$)</label><input type="number" id="m-g" placeholder="0" min="0"></div>
      <div class="modal-field"><label>35cm Médio (R$)</label><input type="number" id="m-m" placeholder="0" min="0"></div>
      <div class="modal-field"><label>30cm Pequeno (R$)</label><input type="number" id="m-p" placeholder="0" min="0"></div>
      <div class="modal-field"><label>25cm Mini (R$)</label><input type="number" id="m-mini" placeholder="0" min="0"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="salvarSabor()">Salvar sabor</button>
    </div>
  </div>
</div>

<!-- Saving overlay -->
<div class="saving-overlay" id="saving-overlay" style="display:none;">
  <div class="saving-box">
    <div class="spinner"></div>
    <p id="saving-msg">Salvando...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
// CONFIGURAÇÃO
// ══════════════════════════════════
const ADMIN_SENHA = "fornatta2026";
const SUPABASE_URL = "https://toubqksuhwihjsnetkme.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdWJxa3N1aHdpaGpzbmV0a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY0OTIsImV4cCI6MjA5NzM5MjQ5Mn0.8MnVmzn9qui_ZT0duimYstbLsMJWKRAGagUr4tNwmb8";

const CATS = [
  {id:"trad",  label:"Tradicionais", color:"#C8102E"},
  {id:"esp",   label:"Especiais",    color:"#E8862E"},
  {id:"prem",  label:"Premium",      color:"#5C9B5A"},
  {id:"doce",  label:"Doces",        color:"#8E5CB8"},
];

let cardapio = {trad:[],esp:[],prem:[],doce:[]};
let activeTab = "trad";
let editando = null;

// ══════════════════════════════════
// SUPABASE API
// ══════════════════════════════════
async function sbGet(params = "") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cardapio?order=ordem.asc,nome.asc${params}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    }
  });
  if (!r.ok) throw new Error(`Erro ${r.status}`);
  return r.json();
}

async function sbInsert(obj) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cardapio`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
    },
    body: JSON.stringify(obj)
  });
  if (!r.ok) throw new Error(`Erro ${r.status}: ${await r.text()}`);
  return r.json();
}

async function sbUpdate(id, obj) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cardapio?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
    },
    body: JSON.stringify(obj)
  });
  if (!r.ok) throw new Error(`Erro ${r.status}: ${await r.text()}`);
  return r.json();
}

async function sbDelete(id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cardapio?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    }
  });
  if (!r.ok) throw new Error(`Erro ${r.status}`);
}

// ══════════════════════════════════
// LOGIN
// ══════════════════════════════════
function tentarLogin() {
  const senha = document.getElementById("inp-senha").value;
  if (senha !== ADMIN_SENHA) {
    document.getElementById("login-err").style.display = "block";
    return;
  }
  document.getElementById("login-err").style.display = "none";
  document.getElementById("screen-login").style.display = "none";
  document.getElementById("screen-admin").style.display = "block";
  carregarCardapio();
}

function sair() {
  document.getElementById("screen-admin").style.display = "none";
  document.getElementById("screen-login").style.display = "flex";
  document.getElementById("inp-senha").value = "";
}

// ══════════════════════════════════
// CARREGAR
// ══════════════════════════════════
async function carregarCardapio() {
  setStatus("warn", "Carregando cardápio...", "");
  try {
    const rows = await sbGet();
    cardapio = {trad:[],esp:[],prem:[],doce:[]};
    for (const row of rows) {
      if (cardapio[row.categoria] !== undefined) {
        cardapio[row.categoria].push(row);
      }
    }
    setStatus("ok", `Cardápio carregado — ${rows.length} itens`, "Supabase · agora");
    renderTabs();
    renderTable();
  } catch(e) {
    setStatus("err", "Erro ao carregar: " + e.message, "Verifique a conexão");
  }
}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
function renderTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(c => `
    <button class="tab-btn ${activeTab===c.id?'active':''}" onclick="setTab('${c.id}')">
      <span class="tab-dot" style="background:${c.color}"></span>
      ${c.label} <span style="opacity:.4;font-size:.72rem;">(${cardapio[c.id].length})</span>
    </button>
  `).join("");
}

function setTab(id) { activeTab = id; renderTabs(); renderTable(); }

function renderTable() {
  const items = cardapio[activeTab];
  const catLabel = CATS.find(c => c.id === activeTab).label;
  document.getElementById("table-area").innerHTML = `
    <div class="table-header">
      <span>Sabor</span>
      <span>40cm</span><span>35cm</span><span>30cm</span><span>25cm</span>
      <span>Ações</span>
    </div>
    <div class="price-table">
      ${items.length === 0
        ? `<div style="padding:24px;text-align:center;color:rgba(245,240,232,0.3);font-size:0.85rem;">Nenhum item nesta categoria.</div>`
        : items.map((item, idx) => `
      <div class="menu-row">
        <div>
          <div class="row-name">${item.nome}</div>
          <div class="row-desc">${item.descricao || ''}</div>
        </div>
        <div class="price-cell">
          <input type="number" value="${item.preco_g || ''}" placeholder="—"
            class="${!item.preco_g?'zero':''}"
            onchange="updatePrecoInline('${item.id}','preco_g',this.value)"
            oninput="this.classList.toggle('zero',!this.value)">
        </div>
        <div class="price-cell">
          <input type="number" value="${item.preco_m || ''}" placeholder="—"
            class="${!item.preco_m?'zero':''}"
            onchange="updatePrecoInline('${item.id}','preco_m',this.value)"
            oninput="this.classList.toggle('zero',!this.value)">
        </div>
        <div class="price-cell">
          <input type="number" value="${item.preco_p || ''}" placeholder="—"
            class="${!item.preco_p?'zero':''}"
            onchange="updatePrecoInline('${item.id}','preco_p',this.value)"
            oninput="this.classList.toggle('zero',!this.value)">
        </div>
        <div class="price-cell">
          <input type="number" value="${item.preco_mini || ''}" placeholder="—"
            class="${!item.preco_mini?'zero':''}"
            onchange="updatePrecoInline('${item.id}','preco_mini',this.value)"
            oninput="this.classList.toggle('zero',!this.value)">
        </div>
        <div class="row-actions">
          <button class="btn-icon edit" title="Editar" onclick="abrirModal('${activeTab}',${idx})">✎</button>
          <button class="btn-icon del"  title="Remover" onclick="removerItem('${item.id}','${item.nome}')">✕</button>
        </div>
      </div>`).join("")}
    </div>
    <button class="add-row-btn" onclick="abrirModal('${activeTab}',null)">+ Adicionar sabor em ${catLabel}</button>
  `;
}

// Atualizar preço direto na tabela (sem reabrir modal)
async function updatePrecoInline(id, campo, valor) {
  try {
    await sbUpdate(id, { [campo]: parseFloat(valor) || 0 });
    // Atualizar local
    for (const cat of Object.keys(cardapio)) {
      const item = cardapio[cat].find(i => i.id === id);
      if (item) { item[campo] = parseFloat(valor) || 0; break; }
    }
    toast("Preço salvo ✓", "success");
  } catch(e) {
    toast("Erro ao salvar: " + e.message, "error");
  }
}

// ══════════════════════════════════
// MODAL
// ══════════════════════════════════
function abrirModal(cat, idx) {
  editando = idx !== null ? {cat, idx} : null;
  document.getElementById("modal-titulo").textContent = idx !== null ? "Editar Sabor" : "Novo Sabor";
  if (idx !== null) {
    const item = cardapio[cat][idx];
    document.getElementById("m-nome").value = item.nome;
    document.getElementById("m-desc").value = item.descricao || '';
    document.getElementById("m-g").value    = item.preco_g    || '';
    document.getElementById("m-m").value    = item.preco_m    || '';
    document.getElementById("m-p").value    = item.preco_p    || '';
    document.getElementById("m-mini").value = item.preco_mini || '';
  } else {
    ["m-nome","m-desc","m-g","m-m","m-p","m-mini"].forEach(id => document.getElementById(id).value = "");
  }
  document.getElementById("modal-sabor").style.display = "flex";
  document.getElementById("m-nome").focus();
}

function fecharModal() {
  document.getElementById("modal-sabor").style.display = "none";
  editando = null;
}

async function salvarSabor() {
  const nome = document.getElementById("m-nome").value.trim();
  if (!nome) { toast("Informe o nome do sabor.", "error"); return; }

  // Capturar editando ANTES de fechar o modal (fecharModal zera a variável)
  const modoEdicao = editando;
  const itemId     = modoEdicao ? cardapio[modoEdicao.cat][modoEdicao.idx].id : null;

  const obj = {
    categoria:  modoEdicao ? modoEdicao.cat : activeTab,
    nome,
    descricao:  document.getElementById("m-desc").value.trim(),
    preco_g:    parseFloat(document.getElementById("m-g").value)    || 0,
    preco_m:    parseFloat(document.getElementById("m-m").value)    || 0,
    preco_p:    parseFloat(document.getElementById("m-p").value)    || 0,
    preco_mini: parseFloat(document.getElementById("m-mini").value) || 0,
    ordem:      modoEdicao ? cardapio[modoEdicao.cat][modoEdicao.idx].ordem : cardapio[activeTab].length,
  };

  fecharModal();
  showSaving(modoEdicao ? "Atualizando sabor..." : "Adicionando sabor...");

  try {
    if (modoEdicao) {
      await sbUpdate(itemId, obj);
    } else {
      await sbInsert(obj);
    }
    await carregarCardapio();
    hideSaving();
    toast(modoEdicao ? "Sabor atualizado ✓" : "Sabor adicionado ✓", "success");
  } catch(e) {
    hideSaving();
    toast("Erro: " + e.message, "error");
  }
}

async function removerItem(id, nome) {
  if (!confirm(`Remover "${nome}"?`)) return;
  showSaving("Removendo...");
  try {
    await sbDelete(id);
    await carregarCardapio();
    hideSaving();
    toast("Sabor removido.", "success");
  } catch(e) {
    hideSaving();
    toast("Erro: " + e.message, "error");
  }
}

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function setStatus(type, text, sub) {
  document.getElementById("status-dot").className = "status-dot dot-" + type;
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-sub").textContent = sub;
}

function showSaving(msg) {
  document.getElementById("saving-msg").textContent = msg;
  document.getElementById("saving-overlay").style.display = "flex";
}
function hideSaving() {
  document.getElementById("saving-overlay").style.display = "none";
}

function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (type ? " " + type : "");
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
